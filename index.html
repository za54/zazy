<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meza Archive 👑 | Dark Fantasy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Imbue:opsz,wght@10..100,400;10..100,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg"></div>
    <div class="dark-overlay"></div>
    <div class="fog"></div>
    <div class="rain"></div>

    <div class="card">
        <h1>Meza Archive 👑</h1>

        <p class="bio">
            Selamat datang di Meza Archive 👑<br>
            Tempat vibe dark fantasy & aesthetic.
        </p>

        <div id="clock"></div>
        
        <p id="quote"></p>

        <div class="links">
            <a href="https://wa.me/62895320911586" class="button">WhatsApp</a>
            <a href="https://www.instagram.com/ezagatauu?igsh=dnB1OHU3MnUydndv" class="button">Instagram</a>
        </div>

        <div class="controls">
            <button class="play-btn" onclick="playMusic()">▶ Play</button>
            <button class="stop-btn" onclick="stopMusic()">⏸ Stop</button>
        </div>
    </div>

    <audio id="musik" loop>
        <source src="goldenbrown.mp3" type="audio/mpeg">
    </audio>

    <script>
        const clockElement = document.getElementById("clock");
        const audio = document.getElementById("musik");

        function playMusic() { audio.play(); }
        function stopMusic() { audio.pause(); }

        // DAFTAR WARNA JAM (Warna Estetik Fantasi)
        const magicColors = ["#ffffff", "#ffd700", "#c8a96a", "#87ceeb", "#e0e0e0", "#f5e6c8", "#a2d2ff", "#ffcc00"];

        function updateClock() {
            const now = new Date();
            const tgl = now.toLocaleDateString("id-ID", { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            const jam = now.toLocaleTimeString("id-ID", { hour: '2-digit', minute: '2-digit', second: '2-digit' });

            // Update Teks (Sedikit styling ukuran jam agar font Imbue terlihat jelas)
            clockElement.innerHTML = `${tgl}<br><span style="font-size: 28px; font-weight:700;">${jam} WIB</span>`;

            // LOGIKA GANTI WARNA ACAK
            const randomColor = magicColors[Math.floor(Math.random() * magicColors.length)];
            clockElement.style.color = randomColor;
            clockElement.style.textShadow = `0 0 20px ${randomColor}cc`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        // Quote Acak
        const quotes = [
            "Darkness reveals the true king 👑",
            "Silence is power.",
            "Fear the calm before the storm.",
            "Legends are born in the shadows.",
            "Winter is coming...",
            "The night is dark and full of terrors."
        ];
        document.getElementById("quote").innerText = quotes[Math.floor(Math.random() * quotes.length)];
    </script>
</body>
</html>
